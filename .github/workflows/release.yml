name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 'Setup: checkout project'
        uses: actions/checkout@v6

      - name: 'Setup: Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'

      - name: 'Setup: Java'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: maven

      - name: 'Release: validate version'
        run: |
          VERSION="$(./mvnw --batch-mode -ntp help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Maven project.version must be semver, got ${VERSION}" >&2
            exit 1
          fi
          if printf '%s' "$VERSION" | grep -Eq -- '-SNAPSHOT$'; then
            echo "Release version must not be a SNAPSHOT, got ${VERSION}" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must match pom.xml version v${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: 'Setup: npm dependencies'
        run: npm ci

      - name: 'Release: validate npm metadata'
        run: |
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
          LOCK_VERSION="$(node -p 'require("./package-lock.json").version')"
          LOCK_ROOT_VERSION="$(node -p 'require("./package-lock.json").packages[""].version')"
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "package.json version ${PACKAGE_VERSION} must match Maven version ${VERSION}" >&2
            exit 1
          fi
          if [ "$LOCK_VERSION" != "$VERSION" ]; then
            echo "package-lock.json version ${LOCK_VERSION} must match Maven version ${VERSION}" >&2
            exit 1
          fi
          if [ "$LOCK_ROOT_VERSION" != "$VERSION" ]; then
            echo "package-lock.json root package version ${LOCK_ROOT_VERSION} must match Maven version ${VERSION}" >&2
            exit 1
          fi

      - name: 'Test: npm wrapper'
        run: npm run test:npm-package

      - name: 'Build: Java package'
        run: ./mvnw --batch-mode -ntp clean package

      - name: 'Build: prepare npm package'
        run: npm run package:prepare

      - name: 'Test: packed npm package'
        run: |
          npm pack --dry-run
          TARBALL="$(npm pack --silent)"
          PREFIX="$(mktemp -d)"
          npm install --global --prefix "$PREFIX" "./$TARBALL"
          "$PREFIX/bin/seed4j" --version

      - name: 'Release: publish npm package'
        run: npm publish --provenance

      - name: 'Release: publish GitHub release'
        id: release-drafter
        uses: release-drafter/release-drafter@v7
        with:
          publish: true
          tag: v${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Release: upload CLI JAR'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release-drafter.outputs.upload_url }}
          asset_path: target/seed4j-cli-${{ env.VERSION }}.jar
          asset_name: seed4j-cli-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive
